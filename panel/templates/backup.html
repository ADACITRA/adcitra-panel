{% extends "layout.html" %}
{% block content %}
<h2>云备份</h2>
<div class="card" style="max-width:800px">
<div style="margin-bottom:16px"><p style="margin-bottom:8px">服务器: <code>https://backup.adacitra.cloud</code></p></div>
<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
<button class="btn-act" onclick="runBk()">执行备份</button>
<button class="btn-act" onclick="lsBk()">查看备份列表</button>
</div>
<pre id="bk-out" style="background:#030712;border:1px solid rgba(0,212,255,.08);border-radius:8px;padding:16px;font-size:13px;line-height:1.9;min-height:80px;overflow-x:auto;color:#e2e8f0">点击按钮执行操作</pre>
</div>
<style>.btn-act{padding:10px 20px;background:linear-gradient(135deg,#00d4ff,#0099cc);border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:14px}.btn-act:hover{opacity:.9}</style>
<script>
function runBk(){document.getElementById('bk-out').textContent='执行中...\n';fetch('/api/backup/run').then(r=>r.text()).then(t=>document.getElementById('bk-out').textContent=t)}
function lsBk(){fetch('/api/backup/list').then(r=>r.text()).then(t=>document.getElementById('bk-out').textContent=t)}
</script>
{% endblock %}
